apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-server
  labels:
    app: drift-ml
    component: model-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: drift-ml
      component: model-server
  template:
    metadata:
      labels:
        app: drift-ml
        component: model-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: model-server
        image: ${REGISTRY}/drift-ml-model-server:${TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: MODEL_SERVER_PORT
          value: "8080"
        - name: MLFLOW_TRACKING_URI
          value: "http://mlflow-service:5000"
        - name: LOG_LEVEL
          value: "INFO"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: drift-ml-secrets
              key: jwt-secret
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2
            memory: 4Gi
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
        volumeMounts:
        - name: model-storage
          mountPath: /app/models
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: model-storage-pvc
