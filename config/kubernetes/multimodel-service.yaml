apiVersion: v1
kind: Service
metadata:
  name: model-server
  labels:
    app: drift-ml
    component: model-server
spec:
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app: drift-ml
    component: model-server
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: model-server-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "20"
spec:
  rules:
  - http:
      paths:
      - path: /api(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: model-server
            port:
              number: 8080
