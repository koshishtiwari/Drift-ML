# MinIO S3-compatible storage configuration
mode: distributed

statefulset:
  replicaCount: 4
  zones: 1
  drivesPerNode: 4
  
resources:
  requests:
    memory: 4Gi
    cpu: 1
  limits:
    memory: 8Gi
    cpu: 2

persistence:
  enabled: true
  storageClass: "standard"
  size: 500Gi
  
metrics:
  serviceMonitor:
    enabled: true
    namespace: drift-ml-monitoring
    
consoleService:
  type: ClusterIP

buckets:
  - name: models
    policy: none
    purge: false
  - name: datasets
    policy: none
    purge: false
  - name: checkpoints
    policy: none
    purge: false
  - name: artifacts
    policy: none
    purge: false

users:
  - accessKey: drift-ml-user
    existingSecret: minio-credentials
    existingSecretKey: access-key
    policy: readwrite

networkPolicy:
  enabled: true
