# Prometheus configuration for Drift-ML monitoring
global:
  evaluation_interval: 30s
  scrape_interval: 30s

server:
  retention: 15d
  replicaCount: 2
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 1000m
      memory: 4Gi
  
  persistentVolume:
    size: 100Gi
    storageClass: standard

alertmanager:
  enabled: true
  replicaCount: 2
  persistentVolume:
    enabled: true
    size: 20Gi
  
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['job', 'alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'drift-ml-team'
      routes:
      - match:
          severity: critical
        receiver: 'drift-ml-team'
    receivers:
    - name: 'drift-ml-team'
      slack_configs:
      - channel: '#drift-ml-alerts'
        send_resolved: true

pushgateway:
  enabled: true

kube-state-metrics:
  enabled: true

prometheus-node-exporter:
  enabled: true

prometheusOperator:
  enabled: true
  serviceMonitor:
    selfMonitor: true
  
  resources:
    limits:
      cpu: 200m
      memory: 200Mi
    requests:
      cpu: 100m
      memory: 100Mi
