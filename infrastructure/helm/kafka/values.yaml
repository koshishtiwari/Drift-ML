# Kafka Helm chart configuration for KRaft mode
clusterDomain: cluster.local
global:
  storageClass: "standard"

kraft:
  enabled: true
  clusterId: "drift-ml-kafka-cluster"
  controllerQuorumVoters: "0@kafka-controller-0.kafka-controller-headless.drift-ml-data.svc.cluster.local:9093,1@kafka-controller-1.kafka-controller-headless.drift-ml-data.svc.cluster.local:9093,2@kafka-controller-2.kafka-controller-headless.drift-ml-data.svc.cluster.local:9093,3@kafka-controller-3.kafka-controller-headless.drift-ml-data.svc.cluster.local:9093,4@kafka-controller-4.kafka-controller-headless.drift-ml-data.svc.cluster.local:9093"

controller:
  replicaCount: 5
  heapOpts: "-Xms1024m -Xmx1024m"
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 1000m
      memory: 3Gi
  persistence:
    enabled: true
    size: 20Gi
    storageClass: "standard"
  config:
    processRoles: "controller"
    controllerListeners: "CONTROLLER://0.0.0.0:9093"
    listenerSecurityProtocolMap: "CONTROLLER:PLAINTEXT,INTERNAL:SASL_SSL,EXTERNAL:SASL_SSL"
    sasl.enabled.mechanisms: "SCRAM-SHA-512"
    sasl.mechanism.controller.protocol: "SCRAM-SHA-512"
    authorizer.class.name: "kafka.security.authorizer.AclAuthorizer"
    super.users: "User:admin"

broker:
  replicaCount: 5
  heapOpts: "-Xms2048m -Xmx2048m"
  resources:
    requests:
      cpu: 1000m
      memory: 4Gi
    limits:
      cpu: 2000m
      memory: 8Gi
  persistence:
    enabled: true
    size: 100Gi
    storageClass: "standard"
  config:
    processRoles: "broker"
    controllerListeners: "CONTROLLER://0.0.0.0:9093"
    listeners: "INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094"
    advertised.listeners: "INTERNAL://${POD_NAME}.kafka-broker-headless.drift-ml-data.svc.cluster.local:9092,EXTERNAL://${EXTERNAL_ACCESS_HOST}:9094"
    inter.broker.listener.name: "INTERNAL"
    listener.security.protocol.map: "CONTROLLER:PLAINTEXT,INTERNAL:SASL_SSL,EXTERNAL:SASL_SSL"
    sasl.enabled.mechanisms: "SCRAM-SHA-512"
    sasl.mechanism.inter.broker.protocol: "SCRAM-SHA-512"
    security.inter.broker.protocol: "SASL_SSL"
    auto.create.topics.enable: "false"
    default.replication.factor: 3
    min.insync.replicas: 2
    num.partitions: 8
    log.retention.hours: 168
    log.segment.bytes: 1073741824
    log.retention.check.interval.ms: 300000
    
ssl:
  enabled: true
  existingSecret: "kafka-tls"
  password: ""
  
sasl:
  enabled: true
  scram:
    enabled: true
    username: "admin"
    existingSecret: "kafka-sasl-credentials"

networkPolicy:
  enabled: true
