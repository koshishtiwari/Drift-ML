# Confluent Schema Registry configuration
replicaCount: 3

image:
  repository: confluentinc/cp-schema-registry
  tag: 7.5.0

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

kafka:
  bootstrapServers: "kafka-broker-0.kafka-broker-headless.drift-ml-data.svc.cluster.local:9092,kafka-broker-1.kafka-broker-headless.drift-ml-data.svc.cluster.local:9092,kafka-broker-2.kafka-broker-headless.drift-ml-data.svc.cluster.local:9092"

schemaRegistry:
  kafkaStore:
    topic: _schemas
    replicationFactor: 3
  
  authentication:
    enabled: true
    type: "basic"
    existingSecret: "schema-registry-credentials"
    secretKey: "basic.properties"

  tls:
    enabled: true
    existingSecret: "schema-registry-tls"

  config:
    avro.compatibility.level: "BACKWARD"
    schema.registry.group.id: "drift-ml-schema-registry"
    kafkastore.security.protocol: "SASL_SSL"
    kafkastore.sasl.mechanism: "SCRAM-SHA-512"
    kafkastore.sasl.jaas.config: "org.apache.kafka.common.security.scram.ScramLoginModule required username=\"producer\" password=\"${KAFKA_PRODUCER_PASSWORD}\";"

persistence:
  enabled: true
  size: 10Gi
  storageClassName: "standard"

service:
  type: ClusterIP
  port: 8081

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "drift-ml-issuer"
  hosts:
    - host: schema-registry.drift-ml.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: schema-registry-ingress-tls
      hosts:
        - schema-registry.drift-ml.com

serviceMonitor:
  enabled: true
  namespace: drift-ml-monitoring
