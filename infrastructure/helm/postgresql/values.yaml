# PostgreSQL Helm chart values
global:
  postgresql:
    auth:
      username: drift_ml
      password: ""
      database: drift_ml
      existingSecret: postgresql-credentials
      secretKeys:
        adminPasswordKey: admin-password
        userPasswordKey: user-password
        replicationPasswordKey: replication-password
    service:
      ports:
        postgresql: 5432

image:
  registry: docker.io
  repository: bitnami/postgresql
  tag: "15.5.0"
  digest: ""
  pullPolicy: IfNotPresent

primary:
  name: primary
  resources:
    requests:
      memory: 2Gi
      cpu: 1000m
    limits:
      memory: 4Gi
      cpu: 2000m
  extendedConfiguration: |
    max_connections = 200
    shared_buffers = 1GB
    effective_cache_size = 3GB
    maintenance_work_mem = 256MB
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB
    default_statistics_target = 100
    random_page_cost = 1.1
    effective_io_concurrency = 200
    work_mem = 10485kB
    min_wal_size = 1GB
    max_wal_size = 4GB
  
  pgHbaConfiguration: |
    local   all             all                                     trust
    host    all             all             127.0.0.1/32            scram-sha-256
    host    all             all             ::1/128                 scram-sha-256
    host    replication     all             127.0.0.1/32            scram-sha-256
    host    replication     all             ::1/128                 scram-sha-256
    hostssl all             all             0.0.0.0/0               scram-sha-256
    hostssl replication     all             0.0.0.0/0               scram-sha-256

  persistence:
    enabled: true
    size: 100Gi
    storageClass: "standard"
    
  synchronousCommit: "on"
  synchronousReplicas: 1

readReplicas:
  name: read
  replicaCount: 2
  resources:
    requests:
      memory: 2Gi
      cpu: 500m
    limits:
      memory: 3Gi
      cpu: 1000m
  persistence:
    enabled: true
    size: 100Gi
    storageClass: "standard"

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: drift-ml-monitoring

networkPolicy:
  enabled: true
  ingressRules:
    primaryAccessOnlyFrom:
      enabled: true
      namespaceSelector: 
        matchLabels:
          name: drift-ml-system
      podSelector: {}
    readReplicasAccessOnlyFrom:
      enabled: true
      namespaceSelector:
        matchLabels:
          name: drift-ml-system
      podSelector: {}
