apiVersion: v1
kind: ConfigMap
metadata:
  name: flink-config
  namespace: drift-ml-data
data:
  flink-conf.yaml: |
    jobmanager.rpc.address: flink-jobmanager
    taskmanager.numberOfTaskSlots: 4
    blob.server.port: 6124
    jobmanager.rpc.port: 6123
    taskmanager.rpc.port: 6122
    jobmanager.memory.process.size: 3g
    taskmanager.memory.process.size: 7g
    
    # State backend configuration
    state.backend: rocksdb
    state.backend.rocksdb.localdir: /opt/flink/rocksdb
    state.checkpoints.dir: s3://checkpoints/flink
    state.savepoints.dir: s3://checkpoints/flink/savepoints
    
    # Checkpoint/Savepoint configuration
    execution.checkpointing.interval: 60000
    execution.checkpointing.mode: EXACTLY_ONCE
    execution.checkpointing.timeout: 600000
    execution.checkpointing.min-pause: 5000
    execution.checkpointing.max-concurrent-checkpoints: 1
    state.backend.incremental: true
    
    # High availability
    high-availability: zookeeper
    high-availability.storageDir: s3://checkpoints/flink/ha
    high-availability.zookeeper.quorum: zookeeper:2181
    high-availability.zookeeper.path.root: /flink
    
    # Fault tolerance
    restart-strategy: exponential-delay
    restart-strategy.exponential-delay.initial-backoff: 1s
    restart-strategy.exponential-delay.max-backoff: 60s
    restart-strategy.exponential-delay.backoff-multiplier: 2.0
    restart-strategy.exponential-delay.reset-backoff-threshold: 10min
    
    # Performance tuning
    taskmanager.network.memory.fraction: 0.1
    taskmanager.memory.managed.fraction: 0.4
    taskmanager.memory.network.min: 64mb
    taskmanager.memory.network.max: 1gb
    taskmanager.memory.segment-size: 8kb
    
    # IO
    fs.s3.endpoint: http://minio.drift-ml-data.svc.cluster.local:9000
    fs.s3.access-key: ${S3_ACCESS_KEY}
    fs.s3.secret-key: ${S3_SECRET_KEY}
    fs.s3.path.style.access: true
    
    # Metrics
    metrics.reporters: prom
    metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
    metrics.reporter.prom.port: 9249
    
    # RocksDB tuning
    state.backend.rocksdb.memory.managed: true
    state.backend.rocksdb.memory.write-buffer-ratio: 0.5
    state.backend.rocksdb.memory.high-prio-pool-ratio: 0.1
    
  log4j.properties: |
    rootLogger.level = INFO
    rootLogger.appenderRef.console.ref = ConsoleAppender
    
    appender.console.name = ConsoleAppender
    appender.console.type = CONSOLE
    appender.console.layout.type = PatternLayout
    appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5p %-60c %x - %m%n
    
    # Suppress the irrelevant warnings
    logger.akka.name = akka
    logger.akka.level = ERROR
    logger.kafka.name= org.apache.kafka
    logger.kafka.level = ERROR
    logger.zookeeper.name = org.apache.zookeeper
    logger.zookeeper.level = ERROR
