apiVersion: v1
kind: Namespace
metadata:
  name: drift-ml-system
  labels:
    name: drift-ml-system
    environment: production
---
apiVersion: v1
kind: Namespace
metadata:
  name: drift-ml-data
  labels:
    name: drift-ml-data
    environment: production
---
apiVersion: v1
kind: Namespace
metadata:
  name: drift-ml-ml
  labels:
    name: drift-ml-ml
    environment: production
---
apiVersion: v1
kind: Namespace
metadata:
  name: drift-ml-monitoring
  labels:
    name: drift-ml-monitoring
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-resources
  namespace: drift-ml-ml
spec:
  hard:
    pods: "50"
    requests.cpu: "20"
    requests.memory: 100Gi
    requests.nvidia.com/gpu: "8"
    limits.cpu: "40" 
    limits.memory: 200Gi
    limits.nvidia.com/gpu: "8"
