apiVersion: v1
kind: Namespace
metadata:
  name: vault
  labels:
    name: vault
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: vault
  namespace: vault
spec:
  chart: vault
  repo: https://helm.releases.hashicorp.com
  targetNamespace: vault
  valuesContent: |-
    server:
      dev:
        enabled: false
      ha:
        enabled: true
        replicas: 3
        raft:
          enabled: true
      ingress:
        enabled: true
        hosts:
          - host: vault.drift-ml.com
            paths: ["/"]
        tls:
          - secretName: vault-tls
            hosts:
              - vault.drift-ml.com
      annotations:
        kubernetes.io/ingress.class: nginx
        cert-manager.io/cluster-issuer: drift-ml-issuer
      
    injector:
      enabled: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-auth
  namespace: drift-ml-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-auth-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
- kind: ServiceAccount
  name: vault-auth
  namespace: drift-ml-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-setup
  namespace: vault
spec:
  template:
    spec:
      serviceAccountName: vault-auth
      containers:
      - name: vault-setup
        image: vault:1.15.2
        command:
        - /bin/sh
        - -c
        - |
          # Initialize Vault with 3 key shares and a threshold of 2
          export VAULT_ADDR=http://vault:8200
          
          # Wait for Vault to be ready
          until vault status; do
            echo "Waiting for Vault to start..."
            sleep 5
          done
          
          # Initialize Vault
          vault operator init -key-shares=3 -key-threshold=2 -format=json > /tmp/vault-init.json
          
          # Store the Vault initialization info in a Kubernetes secret
          cat /tmp/vault-init.json | kubectl create secret generic vault-init -n vault --from-file=init=/dev/stdin
          
          # Configure Kubernetes auth method
          export VAULT_TOKEN=$(cat /tmp/vault-init.json | jq -r '.root_token')
          
          vault auth enable kubernetes
          
          vault write auth/kubernetes/config \
            kubernetes_host="https://$KUBERNETES_SERVICE_HOST:$KUBERNETES_SERVICE_PORT" \
            kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
            token_reviewer_jwt=@/var/run/secrets/kubernetes.io/serviceaccount/token
          
          # Create the database secrets engine for PostgreSQL
          vault secrets enable -path=drift-ml-db database
          
          # Create policy for database access
          vault policy write drift-ml-db - <<EOF
          path "drift-ml-db/*" {
            capabilities = ["read"]
          }
          EOF
          
          # Create Kubernetes role
          vault write auth/kubernetes/role/drift-ml-role \
            bound_service_account_names="*" \
            bound_service_account_namespaces="drift-ml-system,drift-ml-data,drift-ml-ml" \
            policies="drift-ml-db" \
            ttl=1h
      restartPolicy: OnFailure
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-agent-config
  namespace: drift-ml-system
data:
  vault-agent-config.hcl: |
    auto_auth {
      method "kubernetes" {
        mount_path = "auth/kubernetes"
        config = {
          role = "drift-ml-role"
        }
      }
    }
    
    template {
      destination = "/etc/secrets/db-creds.env"
      contents = <<EOH
      {{ with secret "drift-ml-db/creds/postgresql-role" }}
      PGUSER="{{ .Data.username }}"
      PGPASSWORD="{{ .Data.password }}"
      {{ end }}
      EOH
    }
    
    template {
      destination = "/etc/secrets/kafka-creds.env"
      contents = <<EOH
      {{ with secret "drift-ml-db/creds/kafka-role" }}
      KAFKA_USERNAME="{{ .Data.username }}"
      KAFKA_PASSWORD="{{ .Data.password }}"
      {{ end }}
      EOH
    }
